<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Amazon Clone</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f3f3;
}

/* Navbar */
.navbar {
  background: #131921;
  color: white;
  display: flex;
  padding: 10px;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: orange;
}

.search {
  width: 50%;
  padding: 8px;
  border-radius: 4px;
  border: none;
}

.menu {
  display: flex;
  gap: 15px;
}

/* Banner */
.banner {
  width: 100%;
  height: 250px;
  background: url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da') no-repeat center/cover;
}

/* Products */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.price {
  color: green;
  font-weight: bold;
}

button {
  background: orange;
  border: none;
  padding: 8px;
  width: 100%;
  cursor: pointer;
  border-radius: 4px;
}

button:hover {
  background: darkorange;
}

</style>
</head>

<body>

<div class="navbar">
  <div class="logo">MyShop</div>
  <input class="search" placeholder="Search products...">
  <div class="menu">
    <div>Account</div>
    <div>Orders</div>
    <div>Cart</div>
  </div>
</div>

<div class="banner"></div>

<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h4>Product 1</h4>
    <p class="price">₹499</p>
    <button>Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h4>Product 2</h4>
    <p class="price">₹999</p>
    <button>Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h4>Product 3</h4>
    <p class="price">₹299</p>
    <button>Add to Cart</button>
  </div>

</div>

</body>
      </html>
